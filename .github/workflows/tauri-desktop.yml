name: Tauri Desktop Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "src-tauri/**"
      - "package.json"
      - "vite.config.ts"
      - "tsconfig*.json"
      - ".github/workflows/tauri-desktop.yml"

permissions:
  contents: read

concurrency:
  group: tauri-desktop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    name: Build Windows desktop app
    runs-on: windows-latest
    timeout-minutes: 45
    env:
      VITE_DEBUG_NAV: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build files
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm install

      - name: Run frontend build
        run: npm run build

      - name: Build Tauri debug installer
        run: npm run tauri:build -- --debug

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: pioneer-enterprises-admin-windows-debug
          path: |
            src-tauri/target/debug/bundle/nsis/*.exe
            src-tauri/target/debug/pioneer-enterprises-admin.exe
          if-no-files-found: error
          retention-days: 14
